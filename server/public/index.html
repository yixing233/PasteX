<!DOCTYPE html>
<html lang="zh-CN" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasteX - 跨设备剪贴板管理</title>
    <link rel="icon" type="image/webp" href="/PasteX-128.webp">
    <link rel="icon" type="image/png" href="/PasteX-128.png">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            bg: '#111827',
                            surface: '#1F2937',
                            border: '#374151',
                        },
                        brand: {
                            light: '#60A5FA',
                            DEFAULT: '#3B82F6',
                            dark: '#2563EB',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 1.5s infinite',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'orbit': 'orbit 12s linear infinite',
                        'orbit-reverse': 'orbit-reverse 10s linear infinite',
                        'float-rotate': 'float-rotate 8s ease-in-out infinite',
                        'drift-x': 'drift-x 7s ease-in-out infinite',
                        'drift-y': 'drift-y 5s ease-in-out infinite',
                        'glow-pulse': 'glow-pulse 3s ease-in-out infinite',
                        'particle-1': 'particle-float 6s ease-in-out infinite',
                        'particle-2': 'particle-float 8s ease-in-out 2s infinite',
                        'particle-3': 'particle-float 7s ease-in-out 4s infinite',
                        'spin-slow': 'spin 20s linear infinite',
                        'halo-expand-1': 'halo-expand 2s ease-out infinite',
                        'halo-expand-2': 'halo-expand 2s ease-out 0.5s infinite',
                        'halo-expand-3': 'halo-expand 2s ease-out 1s infinite',
                        'border-rotate': 'border-rotate 3s linear infinite',
                        'bokeh-float-1': 'bokeh-float 4s ease-in-out infinite',
                        'bokeh-float-2': 'bokeh-float 5s ease-in-out 1s infinite',
                        'bokeh-float-3': 'bokeh-float 6s ease-in-out 2s infinite',
                        'bokeh-float-4': 'bokeh-float 4.5s ease-in-out 0.5s infinite',
                        'shine-loop': 'shine-sweep 2s ease-in-out infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        'float-rotate': {
                            '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
                            '25%': { transform: 'translateY(-10px) rotate(5deg)' },
                            '50%': { transform: 'translateY(-20px) rotate(0deg)' },
                            '75%': { transform: 'translateY(-10px) rotate(-5deg)' },
                        },
                        orbit: {
                            '0%': { transform: 'rotate(0deg) translateX(140px) rotate(0deg)' },
                            '100%': { transform: 'rotate(360deg) translateX(140px) rotate(-360deg)' },
                        },
                        'orbit-reverse': {
                            '0%': { transform: 'rotate(0deg) translateX(120px) rotate(0deg)' },
                            '100%': { transform: 'rotate(-360deg) translateX(120px) rotate(360deg)' },
                        },
                        'drift-x': {
                            '0%, 100%': { transform: 'translateX(0) scale(1)' },
                            '50%': { transform: 'translateX(15px) scale(1.05)' },
                        },
                        'drift-y': {
                            '0%, 100%': { transform: 'translateY(0) scale(1)' },
                            '50%': { transform: 'translateY(-15px) scale(1.1)' },
                        },
                        'glow-pulse': {
                            '0%, 100%': { opacity: '0.4', transform: 'scale(1)' },
                            '50%': { opacity: '0.8', transform: 'scale(1.2)' },
                        },
                        'particle-float': {
                            '0%': { transform: 'translateY(0) translateX(0) scale(0)', opacity: '0' },
                            '10%': { opacity: '1', transform: 'scale(1)' },
                            '50%': { transform: 'translateY(-30px) translateX(15px) scale(1)', opacity: '0.6' },
                            '90%': { opacity: '0' },
                            '100%': { transform: 'translateY(-60px) translateX(-10px) scale(0)', opacity: '0' },
                        },
                        'halo-expand': {
                            '0%': { transform: 'scale(0.8)', opacity: '0.6', borderWidth: '2px' },
                            '100%': { transform: 'scale(1.8)', opacity: '0', borderWidth: '0.5px' },
                        },
                        'border-rotate': {
                            '0%': { '--angle': '0deg' },
                            '100%': { '--angle': '360deg' },
                        },
                        'bokeh-float': {
                            '0%, 100%': { transform: 'translate(0, 0) scale(1)', opacity: '0.4' },
                            '25%': { transform: 'translate(10px, -15px) scale(1.2)', opacity: '0.7' },
                            '50%': { transform: 'translate(-5px, -25px) scale(0.8)', opacity: '0.5' },
                            '75%': { transform: 'translate(-15px, -10px) scale(1.1)', opacity: '0.6' },
                        },
                        'shine-sweep': {
                            '0%': { transform: 'translateX(-100%) skewX(-12deg)' },
                            '50%': { transform: 'translateX(200%) skewX(-12deg)' },
                            '100%': { transform: 'translateX(200%) skewX(-12deg)' },
                        },
                    }
                }
            }
        }
    </script>
    <!-- Ant Design -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/antd/5.12.2/reset.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dayjs/1.11.10/dayjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/5.12.2/antd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ant-design-icons/4.7.0/index.umd.min.js"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        /* Register --angle property for conic-gradient animation */
        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes border-rotate {
            0% {
                --angle: 0deg;
            }

            100% {
                --angle: 360deg;
            }
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #374151;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: #4B5563;
        }

        /* View Transition Animation */
        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation: none;
            mix-blend-mode: normal;
        }

        ::view-transition-old(root) {
            z-index: 1;
        }

        ::view-transition-new(root) {
            z-index: 999;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-[#111827] text-slate-900 dark:text-white transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { flushSync } = ReactDOM;
        const { Button, ConfigProvider, theme: antTheme, Input, Space, Dropdown } = antd;
        const { SearchOutlined, GithubOutlined, ArrowRightOutlined, GlobalOutlined, AppstoreOutlined } = icons;
        const { darkAlgorithm, defaultAlgorithm } = antTheme;

        const App = () => {
            const [isDarkMode, setIsDarkMode] = useState(() => {
                const saved = localStorage.getItem('mode');
                if (saved) return saved === 'dark';
                return window.matchMedia('(prefers-color-scheme: dark)').matches;
            });

            const [changelogData, setChangelogData] = useState([]);
            const [changelogLoading, setChangelogLoading] = useState(true);

            // Fetch changelog from API
            useEffect(() => {
                fetch('/api/changelog')
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) setChangelogData(data.data);
                    })
                    .catch(err => console.error('Failed to load changelog:', err))
                    .finally(() => setChangelogLoading(false));
            }, []);

            useEffect(() => {
                const root = window.document.documentElement;
                if (isDarkMode) {
                    root.classList.add('dark');
                    localStorage.setItem('mode', 'dark');
                } else {
                    root.classList.remove('dark');
                    localStorage.setItem('mode', 'light');
                }
            }, [isDarkMode]);

            useEffect(() => {
                const handleStorage = (e) => {
                    if (e.key === 'mode') {
                        setIsDarkMode(e.newValue === 'dark');
                    }
                };
                window.addEventListener('storage', handleStorage);
                return () => window.removeEventListener('storage', handleStorage);
            }, []);

            const toggleTheme = async (event) => {
                const nextMode = !isDarkMode;

                if (!document.startViewTransition) {
                    setIsDarkMode(nextMode);
                    return;
                }

                const x = event.clientX;
                const y = event.clientY;
                const endRadius = Math.hypot(
                    Math.max(x, innerWidth - x),
                    Math.max(y, innerHeight - y),
                );

                const transition = document.startViewTransition(() => {
                    flushSync(() => {
                        setIsDarkMode(nextMode);
                        if (nextMode) document.documentElement.classList.add('dark');
                        else document.documentElement.classList.remove('dark');
                    });
                });

                await transition.ready;

                document.documentElement.animate(
                    {
                        clipPath: [
                            `circle(0px at ${x}px ${y}px)`,
                            `circle(${endRadius}px at ${x}px ${y}px)`,
                        ],
                    },
                    {
                        duration: 500,
                        easing: 'ease-in-out',
                        pseudoElement: '::view-transition-new(root)',
                    },
                );
            };

            const latestVersion = changelogData.length > 0 ? changelogData[0] : { version: '...', links: [] };

            return (
                <ConfigProvider
                    theme={{
                        algorithm: isDarkMode ? darkAlgorithm : defaultAlgorithm,
                        token: {
                            colorPrimary: '#3B82F6',
                            borderRadius: 8,
                            fontFamily: 'Inter, sans-serif',
                            colorBgContainer: isDarkMode ? '#1F2937' : '#ffffff',
                        }
                    }}
                >
                    <div className="min-h-screen flex flex-col transition-colors duration-300">

                        {/* Header */}
                        <header className="fixed w-full top-0 z-50 bg-white/80 dark:bg-[#111827]/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800 transition-colors duration-300">
                            <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                                <div className="flex items-center gap-3 w-48">
                                    <div className="w-8 h-8 rounded-lg overflow-hidden bg-gray-100 dark:bg-white/10 p-0.5">
                                        <picture>
                                            <source srcSet="/PasteX-64.webp" type="image/webp" />
                                            <img src="/PasteX-64.png" alt="PasteX" className="w-full h-full object-cover rounded-md" width="32" height="32" />
                                        </picture>
                                    </div>
                                    <span className="font-bold text-xl tracking-tight text-slate-900 dark:text-white">PasteX</span>
                                </div>

                                <nav className="flex items-center gap-6 text-sm font-medium text-slate-600 dark:text-gray-300">
                                    <a href="#guide" className="hover:text-blue-600 dark:hover:text-white transition-colors hidden lg:block">使用指南</a>
                                    <a href="#download" className="hover:text-blue-600 dark:hover:text-white transition-colors">下载</a>
                                    <a href="#changelog" className="hover:text-blue-600 dark:hover:text-white transition-colors hidden lg:block">更新日志</a>

                                    <div className="h-4 w-px bg-gray-300 dark:bg-gray-700 mx-1"></div>
                                    <a href="https://github.com/yixing233/PasteX" target="_blank" className="text-xl hover:text-red-600 dark:hover:text-red-500 transition-colors flex items-center gap-2" title="访问 GitHub 源码">
                                        <i className="fa-brands fa-git-alt"></i>
                                        <span className="text-sm font-bold">GitHub</span>
                                    </a>
                                    <button
                                        onClick={toggleTheme}
                                        className="w-8 h-8 rounded-full border border-gray-200 dark:border-gray-700 flex items-center justify-center text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 hover:text-amber-500 dark:hover:text-amber-400 transition-all overflow-hidden relative"
                                        title={isDarkMode ? "切换亮色模式" : "切换深色模式"}
                                    >
                                        {isDarkMode ? <i className="fa-solid fa-sun"></i> : <i className="fa-solid fa-moon"></i>}
                                    </button>
                                </nav>
                            </div>
                        </header>

                        {/* Main Content */}
                        <main className="flex-grow flex items-center justify-center relative pt-16 transition-colors duration-300">
                            <div className="absolute top-20 left-1/4 w-96 h-96 bg-blue-500/10 dark:bg-blue-600/20 rounded-full blur-3xl pointer-events-none transition-colors duration-500"></div>
                            <div className="absolute bottom-20 right-1/4 w-96 h-96 bg-cyan-500/10 dark:bg-cyan-600/10 rounded-full blur-3xl pointer-events-none transition-colors duration-500"></div>

                            <div className="max-w-7xl mx-auto px-4 w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center py-20">

                                {/* Text Content */}
                                <div className="text-center lg:text-left z-10">
                                    <div className="inline-block mb-4">
                                        <div className="flex items-center gap-2 px-3 py-1 rounded-full bg-blue-50 dark:bg-blue-500/10 border border-blue-200 dark:border-blue-500/20 text-blue-600 dark:text-blue-400 text-xs font-semibold uppercase tracking-wider transition-colors">
                                            <span className="w-2 h-2 rounded-full bg-blue-500 dark:bg-blue-400 animate-pulse"></span>
                                            {latestVersion.version} Release
                                        </div>
                                    </div>

                                    <h1 className="text-6xl sm:text-7xl font-bold tracking-tight text-slate-900 dark:text-white mb-2 leading-tight transition-colors">
                                        <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-500 dark:from-cyan-400 dark:to-blue-500">PasteX</span>
                                    </h1>
                                    <h2 className="text-4xl sm:text-5xl font-bold text-slate-700 dark:text-gray-100 mb-8 transition-colors">
                                        跨设备剪贴板管理
                                    </h2>

                                    <p className="text-xl text-slate-500 dark:text-gray-400 mb-10 max-w-lg mx-auto lg:mx-0 font-light transition-colors">
                                        免费、开源、跨平台
                                        <br />
                                        专为追求极致效率的开发者与创作者设计。
                                    </p>

                                    <div className="flex flex-col sm:flex-row gap-4 justify-center lg:justify-start">
                                        <Button type="primary" size="large" href="#download" className="h-12 px-8 rounded-full text-base font-medium shadow-lg shadow-blue-500/25 border-none bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400">
                                            <i className="fa-solid fa-download mr-2"></i>下载
                                        </Button>
                                        <Button size="large" href="#guide" className="h-12 px-8 rounded-full text-base font-medium bg-white dark:bg-gray-800 border-gray-200 dark:border-gray-700 text-slate-700 dark:text-gray-200 hover:bg-gray-50 dark:hover:bg-gray-700 hover:text-slate-900 dark:hover:text-white hover:border-gray-300 dark:hover:border-gray-600 transition-all">
                                            使用指南
                                        </Button>
                                    </div>

                                    <div className="mt-12 flex items-center justify-center lg:justify-start gap-8 text-slate-400 dark:text-gray-500 text-sm font-medium transition-colors">
                                        <div className="flex items-center gap-2 hover:text-slate-600 dark:hover:text-gray-300 cursor-default"><i className="fab fa-windows text-lg"></i> Windows</div>
                                        <div className="flex items-center gap-2 hover:text-slate-600 dark:hover:text-gray-300 cursor-default"><i className="fab fa-apple text-lg"></i> macOS</div>
                                        <div className="flex items-center gap-2 hover:text-slate-600 dark:hover:text-gray-300 cursor-default"><i className="fab fa-linux text-lg"></i> Linux</div>
                                    </div>
                                </div>

                                {/* Visual Content (Right Side) - Big Icon with Complex Animations */}
                                <div className="relative flex justify-center items-center z-10 mt-10 lg:mt-0">
                                    {/* Orbital Ring */}
                                    <div className="absolute w-[340px] h-[340px] sm:w-[420px] sm:h-[420px] lg:w-[500px] lg:h-[500px] rounded-full border border-dashed border-blue-200/40 dark:border-blue-500/15 animate-spin-slow pointer-events-none"></div>
                                    <div className="absolute w-[280px] h-[280px] sm:w-[350px] sm:h-[350px] lg:w-[420px] lg:h-[420px] rounded-full border border-dotted border-cyan-200/30 dark:border-cyan-500/10 pointer-events-none" style={{ animation: 'spin 15s linear reverse infinite' }}></div>

                                    {/* Glow Background */}
                                    <div className="absolute w-48 h-48 bg-blue-400/20 dark:bg-blue-500/10 rounded-full blur-3xl animate-glow-pulse pointer-events-none"></div>
                                    <div className="absolute w-32 h-32 bg-cyan-400/15 dark:bg-cyan-400/5 rounded-full blur-2xl animate-glow-pulse pointer-events-none" style={{ animationDelay: '1.5s' }}></div>

                                    <div className="relative w-64 h-64 sm:w-80 sm:h-80 lg:w-96 lg:h-96 animate-float group">
                                        {/* Shadow Layer */}
                                        <div className="absolute inset-0 bg-gradient-to-br from-blue-400 to-blue-600 dark:from-cyan-400 dark:to-blue-600 rounded-[2.5rem] rotate-3 opacity-90 blur-sm transform scale-95 translate-y-4 transition-all duration-500 group-hover:blur-xl group-hover:opacity-100 group-hover:scale-100"></div>

                                        {/* === HOVER EFFECT 1: Expanding Halo Rings === */}
                                        <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
                                            <div className="w-full h-full rounded-[2.5rem] border-2 border-blue-400/0 group-hover:border-blue-400/40 dark:group-hover:border-cyan-400/40 opacity-0 group-hover:opacity-100 group-hover:animate-halo-expand-1 transition-opacity duration-300"></div>
                                            <div className="absolute w-full h-full rounded-[2.5rem] border-2 border-cyan-400/0 group-hover:border-cyan-400/30 dark:group-hover:border-blue-400/30 opacity-0 group-hover:opacity-100 group-hover:animate-halo-expand-2 transition-opacity duration-300"></div>
                                            <div className="absolute w-full h-full rounded-[2.5rem] border border-purple-400/0 group-hover:border-purple-400/20 dark:group-hover:border-purple-400/20 opacity-0 group-hover:opacity-100 group-hover:animate-halo-expand-3 transition-opacity duration-300"></div>
                                        </div>

                                        {/* === HOVER EFFECT 2: Animated Gradient Border Glow === */}
                                        <div className="absolute -inset-[2px] rounded-[2.7rem] opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"
                                            style={{ background: 'conic-gradient(from var(--angle, 0deg), #3b82f6, #06b6d4, #8b5cf6, #ec4899, #3b82f6)', animation: 'border-rotate 3s linear infinite', padding: '2px' }}>
                                            <div className="w-full h-full rounded-[2.5rem] bg-white dark:bg-[#111827]"></div>
                                        </div>

                                        {/* Main Card */}
                                        <div className="relative w-full h-full bg-white dark:bg-[#111827] rounded-[2.5rem] border border-gray-200 dark:border-gray-700/50 shadow-2xl flex items-center justify-center overflow-hidden transition-all duration-500 group-hover:shadow-[0_0_60px_-10px_rgba(59,130,246,0.5)] dark:group-hover:shadow-[0_0_60px_-10px_rgba(6,182,212,0.4)] group-hover:border-transparent">
                                            {/* Inner gradient overlay */}
                                            <div className="absolute inset-0 bg-gradient-to-b from-gray-50 dark:from-gray-800/50 to-transparent pointer-events-none transition-colors"></div>

                                            {/* === HOVER EFFECT 3: Radial glow behind icon === */}
                                            <div className="absolute w-40 h-40 rounded-full bg-blue-400/0 group-hover:bg-blue-400/15 dark:group-hover:bg-cyan-400/10 blur-3xl transition-all duration-700 group-hover:scale-150 pointer-events-none"></div>
                                            <div className="absolute w-24 h-24 rounded-full bg-purple-400/0 group-hover:bg-purple-400/10 dark:group-hover:bg-purple-400/8 blur-2xl transition-all duration-700 delay-100 group-hover:scale-[2] pointer-events-none"></div>

                                            {/* Icon */}
                                            <picture className="flex items-center justify-center w-full h-full relative z-10">
                                                <source srcSet="/PasteX-384.webp" type="image/webp" />
                                                <img src="/PasteX-384.png" alt="Big Icon" className="w-2/3 h-2/3 object-contain drop-shadow-2xl transition-all duration-500 group-hover:scale-110 group-hover:drop-shadow-[0_0_30px_rgba(59,130,246,0.3)]" width="384" height="384" loading="eager" />
                                            </picture>

                                            {/* === HOVER EFFECT 4: Bokeh light particles === */}
                                            <div className="absolute inset-0 pointer-events-none opacity-0 group-hover:opacity-100 transition-opacity duration-500">
                                                <div className="absolute top-[15%] left-[20%] w-3 h-3 bg-blue-400/40 rounded-full blur-[2px] animate-bokeh-float-1"></div>
                                                <div className="absolute top-[60%] right-[15%] w-2 h-2 bg-cyan-400/50 rounded-full blur-[1px] animate-bokeh-float-2"></div>
                                                <div className="absolute bottom-[20%] left-[30%] w-2.5 h-2.5 bg-purple-400/30 rounded-full blur-[2px] animate-bokeh-float-3"></div>
                                                <div className="absolute top-[35%] right-[25%] w-1.5 h-1.5 bg-pink-400/40 rounded-full blur-[1px] animate-bokeh-float-4"></div>
                                                <div className="absolute bottom-[40%] left-[60%] w-2 h-2 bg-emerald-400/30 rounded-full blur-[2px] animate-bokeh-float-1" style={{ animationDelay: '1.5s' }}></div>
                                                <div className="absolute top-[70%] left-[15%] w-1.5 h-1.5 bg-amber-400/40 rounded-full blur-[1px] animate-bokeh-float-3" style={{ animationDelay: '0.8s' }}></div>
                                            </div>

                                            {/* === HOVER EFFECT 5: Continuous shine sweep === */}
                                            <div className="absolute inset-0 overflow-hidden rounded-[2.5rem] pointer-events-none">
                                                <div className="absolute top-0 -left-full h-full w-1/2 bg-gradient-to-r from-transparent via-white/25 dark:via-white/10 to-transparent opacity-0 group-hover:opacity-100 group-hover:animate-shine-loop"></div>
                                            </div>
                                        </div>

                                        {/* Floating Elements - all respond to main card hover */}
                                        {/* Top-right: Image icon */}
                                        <div className="absolute -top-6 -right-6 bg-white dark:bg-gray-800 p-3.5 rounded-xl border border-gray-100 dark:border-gray-700 shadow-xl transition-all duration-500 animate-float-rotate group-hover:scale-110 group-hover:shadow-cyan-400/30 group-hover:shadow-2xl group-hover:border-cyan-300 dark:group-hover:border-cyan-600">
                                            <i className="fa-regular fa-image text-cyan-500 dark:text-cyan-400 text-2xl transition-all duration-500 group-hover:drop-shadow-[0_0_8px_rgba(6,182,212,0.6)]"></i>
                                        </div>

                                        {/* Bottom-left: Code icon */}
                                        <div className="absolute -bottom-8 -left-4 bg-white dark:bg-gray-800 p-3.5 rounded-xl border border-gray-100 dark:border-gray-700 shadow-xl transition-all duration-500 animate-drift-x group-hover:scale-110 group-hover:shadow-blue-400/30 group-hover:shadow-2xl group-hover:border-blue-300 dark:group-hover:border-blue-600" style={{ animationDelay: '1s' }}>
                                            <i className="fa-solid fa-code text-blue-500 text-2xl transition-all duration-500 group-hover:drop-shadow-[0_0_8px_rgba(59,130,246,0.6)]"></i>
                                        </div>

                                        {/* Top-left: Sync icon */}
                                        <div className="absolute -top-10 -left-8 bg-white dark:bg-gray-800 p-3 rounded-lg border border-gray-100 dark:border-gray-700 shadow-lg transition-all duration-500 animate-drift-y group-hover:scale-110 group-hover:shadow-emerald-400/30 group-hover:shadow-2xl group-hover:border-emerald-300 dark:group-hover:border-emerald-600" style={{ animationDelay: '0.5s' }}>
                                            <i className="fa-solid fa-rotate text-emerald-500 dark:text-emerald-400 text-xl transition-all duration-500 group-hover:drop-shadow-[0_0_8px_rgba(16,185,129,0.6)]"></i>
                                        </div>

                                        {/* Right-center: Shield icon */}
                                        <div className="absolute top-1/2 -right-12 -translate-y-1/2 bg-white dark:bg-gray-800 p-3 rounded-lg border border-gray-100 dark:border-gray-700 shadow-lg transition-all duration-500 animate-float-delayed group-hover:scale-110 group-hover:shadow-purple-400/30 group-hover:shadow-2xl group-hover:border-purple-300 dark:group-hover:border-purple-600">
                                            <i className="fa-solid fa-shield-halved text-purple-500 dark:text-purple-400 text-xl transition-all duration-500 group-hover:drop-shadow-[0_0_8px_rgba(168,85,247,0.6)]"></i>
                                        </div>

                                        {/* Bottom-right: Clipboard icon */}
                                        <div className="absolute -bottom-4 -right-10 bg-white dark:bg-gray-800 p-3 rounded-lg border border-gray-100 dark:border-gray-700 shadow-lg transition-all duration-500 animate-drift-x group-hover:scale-110 group-hover:shadow-amber-400/30 group-hover:shadow-2xl group-hover:border-amber-300 dark:group-hover:border-amber-600" style={{ animationDelay: '2s' }}>
                                            <i className="fa-regular fa-clipboard text-amber-500 dark:text-amber-400 text-xl transition-all duration-500 group-hover:drop-shadow-[0_0_8px_rgba(245,158,11,0.6)]"></i>
                                        </div>

                                        {/* Left-center: Globe icon */}
                                        <div className="absolute top-1/3 -left-12 bg-white dark:bg-gray-800 p-3 rounded-lg border border-gray-100 dark:border-gray-700 shadow-lg transition-all duration-500 animate-float group-hover:scale-110 group-hover:shadow-rose-400/30 group-hover:shadow-2xl group-hover:border-rose-300 dark:group-hover:border-rose-600" style={{ animationDelay: '3s' }}>
                                            <i className="fa-solid fa-language text-rose-500 dark:text-rose-400 text-xl transition-all duration-500 group-hover:drop-shadow-[0_0_8px_rgba(244,63,94,0.6)]"></i>
                                        </div>
                                    </div>

                                    {/* Orbiting Elements */}
                                    <div className="absolute animate-orbit pointer-events-none">
                                        <div className="bg-blue-500/80 w-3 h-3 rounded-full shadow-lg shadow-blue-500/50"></div>
                                    </div>
                                    <div className="absolute animate-orbit-reverse pointer-events-none" style={{ animationDelay: '3s' }}>
                                        <div className="bg-cyan-400/80 w-2 h-2 rounded-full shadow-lg shadow-cyan-400/50"></div>
                                    </div>

                                    {/* Particle Effects */}
                                    <div className="absolute top-1/4 right-1/4 w-1.5 h-1.5 bg-blue-400/60 rounded-full animate-particle-1 pointer-events-none"></div>
                                    <div className="absolute bottom-1/3 left-1/4 w-1 h-1 bg-cyan-400/60 rounded-full animate-particle-2 pointer-events-none"></div>
                                    <div className="absolute top-1/3 left-1/3 w-1.5 h-1.5 bg-purple-400/40 rounded-full animate-particle-3 pointer-events-none"></div>
                                </div>

                            </div>
                        </main>

                        {/* Guide Section */}
                        <section id="guide" className="py-24 bg-white dark:bg-[#111827] relative border-t border-gray-100 dark:border-gray-800/50 transition-colors duration-300">
                            <div className="max-w-7xl mx-auto px-4">
                                <div className="text-center mb-16">
                                    <h2 className="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-cyan-500 dark:from-blue-400 dark:to-cyan-400 inline-block mb-4 transition-colors">
                                        使用指南
                                    </h2>
                                    <p className="text-slate-500 dark:text-gray-400 text-lg transition-colors">简单几步，开启高效剪贴板管理</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 relative">
                                    <div className="hidden md:block absolute top-[2rem] left-[16%] right-[16%] h-0.5 bg-gradient-to-r from-blue-200 dark:from-blue-500/20 via-cyan-200 dark:via-cyan-500/20 to-blue-200 dark:to-blue-500/20 -z-10 transition-colors"></div>

                                    {[
                                        { step: '01', title: '下载安装', desc: '获取适用于 Windows 的安装包，支持便携版解压即用。', icon: 'fa-download' },
                                        { step: '02', title: '快捷唤醒', desc: '默认使用 Alt+V 唤醒面板，支持自定义快捷键以及界面布局。', icon: 'fa-keyboard' },
                                        { step: '03', title: '多端同步', desc: '在设置中开启同步服务，局域网内自动发现设备，即刻同步。', icon: 'fa-rotate' }
                                    ].map((item, i) => (
                                        <div key={i} className="flex flex-col items-center text-center group">
                                            <div className="w-16 h-16 rounded-2xl bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 flex items-center justify-center text-2xl text-blue-500 dark:text-blue-400 mb-6 group-hover:scale-110 group-hover:border-blue-400 dark:group-hover:border-blue-500/50 shadow-sm dark:shadow-none group-hover:shadow-[0_0_20px_rgba(59,130,246,0.2)] transition-all duration-300 relative z-10">
                                                <i className={`fa-solid ${item.icon}`}></i>
                                                <div className="absolute -top-3 -right-3 w-8 h-8 rounded-full bg-slate-50 dark:bg-gray-900 border border-gray-200 dark:border-gray-700 flex items-center justify-center text-xs font-bold text-gray-500 dark:text-gray-500 group-hover:text-blue-500 dark:group-hover:text-white group-hover:border-blue-400 dark:group-hover:border-blue-500/50 transition-colors">
                                                    {item.step}
                                                </div>
                                            </div>
                                            <h3 className="text-xl font-bold text-slate-800 dark:text-white mb-3 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">{item.title}</h3>
                                            <p className="text-slate-500 dark:text-gray-400 leading-relaxed max-w-xs transition-colors">{item.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        {/* Downloads Grid */}
                        <div id="download" className="border-t border-gray-200 dark:border-gray-800 bg-gray-50 dark:bg-[#161e2e]/50 backdrop-blur-sm py-16 transition-colors duration-300">
                            <div className="max-w-7xl mx-auto px-4">
                                <div className="text-center mb-12">
                                    <h2 className="text-3xl font-bold text-slate-900 dark:text-white mb-4">最新版本下载 ({latestVersion.version})</h2>
                                    <p className="text-slate-500 dark:text-gray-400">选择适合您的版本</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl mx-auto">
                                    {latestVersion.links && latestVersion.links.length >= 2 ? [
                                        {
                                            name: 'Windows 安装版',
                                            icon: 'windows',
                                            iconPrefix: 'fa-brands',
                                            desc: '推荐大多数用户使用',
                                            subDesc: '.exe Installer',
                                            link: latestVersion.links[0].url,
                                            primary: true
                                        },
                                        {
                                            name: 'Windows 便携版',
                                            icon: 'box-archive',
                                            iconPrefix: 'fa-solid',
                                            desc: '免安装，解压即用',
                                            subDesc: 'Portable .exe',
                                            link: latestVersion.links[1].url,
                                            primary: false
                                        }
                                    ].map((item, i) => (
                                        <a key={i} href={item.link} className={`group relative overflow-hidden rounded-2xl p-8 flex items-center gap-6 transition-all duration-300 ${item.primary ? 'bg-gradient-to-br from-blue-600 to-blue-700 text-white shadow-lg shadow-blue-500/30 hover:shadow-blue-500/40 hover:-translate-y-1' : 'bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 text-slate-800 dark:text-white hover:border-blue-500 dark:hover:border-blue-400 hover:shadow-lg dark:hover:shadow-blue-500/10 hover:-translate-y-1'}`}>
                                            <div className={`w-16 h-16 rounded-xl flex items-center justify-center text-3xl ${item.primary ? 'bg-white/20 text-white' : 'bg-blue-50 dark:bg-blue-500/10 text-blue-600 dark:text-blue-400'}`}>
                                                <i className={`${item.iconPrefix} fa-${item.icon}`}></i>
                                            </div>
                                            <div>
                                                <h3 className="font-bold text-xl mb-1">{item.name}</h3>
                                                <p className={`text-sm ${item.primary ? 'text-blue-100' : 'text-slate-500 dark:text-gray-400'}`}>{item.desc}</p>
                                                <div className={`mt-2 text-xs font-mono opacity-75 ${item.primary ? 'text-blue-200' : 'text-slate-400'}`}>{item.subDesc}</div>
                                            </div>
                                            <div className={`absolute right-6 opacity-0 group-hover:opacity-100 transition-all duration-300 transform translate-x-4 group-hover:translate-x-0 ${item.primary ? 'text-white' : 'text-blue-500'}`}>
                                                <i className="fa-solid fa-download text-2xl"></i>
                                            </div>
                                        </a>
                                    )) : (
                                        <div className="col-span-2 text-center py-8 text-slate-400 dark:text-gray-500">
                                            <i className="fa-solid fa-spinner fa-spin text-2xl mb-3 block"></i>
                                            <span>加载中...</span>
                                        </div>
                                    )}
                                </div>
                                <div className="text-center mt-12 text-slate-400 dark:text-gray-500 text-sm transition-colors">
                                    PasteX Dashboard &copy; 2026 Open Source Project &middot; <a href="https://github.com/yixing233/PasteX/releases" target="_blank" className="hover:text-blue-500 transition-colors">查看全部历史版本</a>
                                </div>
                            </div>
                        </div>

                        {/* Changelog Section */}
                        <section id="changelog" className="py-24 bg-gray-50 dark:bg-[#161e2e]/30 relative border-t border-gray-100 dark:border-gray-800/50 transition-colors duration-300">
                            <div className="max-w-4xl mx-auto px-4">
                                <div className="text-center mb-16">
                                    <h2 className="text-3xl font-bold text-slate-900 dark:text-white mb-4 transition-colors">版本历史 &amp; 更新日志</h2>
                                    <p className="text-slate-500 dark:text-gray-400">持续迭代，只为更好的体验</p>
                                </div>

                                <div className="space-y-12">
                                    {changelogLoading ? (
                                        <div className="text-center py-12 text-slate-400 dark:text-gray-500">
                                            <i className="fa-solid fa-spinner fa-spin text-2xl mb-3 block"></i>
                                            <span>加载更新日志...</span>
                                        </div>
                                    ) : changelogData.map((release, i) => (
                                        <div key={release.id || i} className="relative pl-8 md:pl-0">
                                            <div className="hidden md:block absolute left-[150px] top-0 bottom-0 w-px bg-gray-200 dark:bg-gray-700 -z-10 last:hidden"></div>

                                            <div className="md:flex gap-12 group">
                                                <div className="md:w-[150px] flex-shrink-0 flex flex-col items-end text-right md:pr-8 relative">
                                                    <div className={`hidden md:block absolute right-[-5px] top-3 w-2.5 h-2.5 rounded-full border-2 border-white dark:border-gray-900 ${i === 0 ? 'bg-blue-500 box-content shadow-[0_0_0_4px_rgba(59,130,246,0.2)]' : 'bg-gray-300 dark:bg-gray-600'}`}></div>

                                                    <div className={`inline-block px-3 py-1 rounded-full text-sm font-bold mb-2 ${i === 0 ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/30' : 'bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>
                                                        {release.version}
                                                    </div>
                                                    <div className="text-sm text-slate-400 dark:text-gray-500 font-mono">{release.date}</div>
                                                </div>

                                                <div className="flex-1 pb-12 border-b border-gray-100 dark:border-gray-800/50 last:border-0 last:pb-0">
                                                    <div className="md:hidden flex items-center gap-3 mb-4">
                                                        <div className={`inline-block px-3 py-1 rounded-full text-sm font-bold ${i === 0 ? 'bg-blue-600 text-white' : 'bg-gray-200 dark:bg-gray-700 text-gray-600 dark:text-gray-300'}`}>
                                                            {release.version}
                                                        </div>
                                                        <span className="text-sm text-slate-400 dark:text-gray-500">{release.date}</span>
                                                    </div>

                                                    {/* Download Links */}
                                                    <div className="flex flex-wrap gap-4 text-sm mb-6">
                                                        {release.links && release.links.length > 0 && release.links.map((link, l) => (
                                                            <a key={l} href={link.url} className="text-blue-600 dark:text-blue-400 hover:underline hover:text-blue-500 transition-colors flex items-center gap-1.5 font-medium">
                                                                <i className="fa-solid fa-download text-xs"></i>
                                                                {link.text}
                                                            </a>
                                                        ))}
                                                        {(!release.links || release.links.length === 0) && <span className="text-slate-400 dark:text-gray-600 text-xs">历史版本</span>}
                                                    </div>

                                                    <ul className="space-y-3">
                                                        {release.items.map((item, j) => (
                                                            <li key={j} className="flex items-start gap-3 text-slate-600 dark:text-gray-300 leading-relaxed">
                                                                <span className="mt-2 w-1.5 h-1.5 rounded-full bg-slate-300 dark:bg-gray-600 flex-shrink-0 group-hover:bg-blue-400 transition-colors"></span>
                                                                <span>{item}</span>
                                                            </li>
                                                        ))}
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                    </div>
                </ConfigProvider>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
