<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PasteX Server Dashboard</title>
    <link rel="icon" type="image/png" href="/PasteX.png">

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Day.js -->
    <script src="https://unpkg.com/dayjs/dayjs.min.js"></script>
    <script src="https://unpkg.com/dayjs/plugin/relativeTime.js"></script>
    <script>dayjs.extend(dayjs_plugin_relativeTime);</script>

    <!-- Ant Design -->
    <script src="https://unpkg.com/antd@5.12.2/dist/antd.min.js"></script>

    <!-- Ant Design Icons -->
    <script src="https://unpkg.com/@ant-design/icons@5.2.6/dist/index.umd.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#1677ff',
                        'primary-bg': '#e6f7ff',
                        dark: {
                            bg: '#0d1117', // Github Dark Dimmed Style
                            surface: '#161b22',
                            border: '#30363d',
                        }
                    },
                    borderRadius: {
                        'card': '12px',
                    },
                    boxShadow: {
                        'card': '0 1px 2px 0 rgba(0, 0, 0, 0.03), 0 1px 6px -1px rgba(0, 0, 0, 0.02), 0 2px 4px 0 rgba(0, 0, 0, 0.02)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        .dark ::-webkit-scrollbar-thumb {
            background: #3c444d;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        .dark ::-webkit-scrollbar-thumb:hover {
            background: #6e7681;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .dark .glass-card {
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid rgba(48, 54, 61, 0.6);
        }

        .stats-card-icon {
            transition: all 0.3s ease;
        }

        .stats-card:hover .stats-card-icon {
            transform: scale(1.1);
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-slide-in {
            animation: fadeSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none !important;
            width: 0 !important;
            height: 0 !important;
        }

        .no-scrollbar {
            -ms-overflow-style: none !important;
            scrollbar-width: none !important;
        }

        .latest-scroll {
            scrollbar-width: thin;
            scrollbar-color: #94a3b8 transparent;
        }

        .dark .latest-scroll {
            scrollbar-color: #6e7681 transparent;
        }

        .latest-scroll::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .latest-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .latest-scroll::-webkit-scrollbar-thumb {
            background: #94a3b8;
            border-radius: 999px;
        }

        .dark .latest-scroll::-webkit-scrollbar-thumb {
            background: #6e7681;
        }

        .latest-scroll::-webkit-scrollbar-thumb:hover {
            background: #64748b;
        }

        .dark .latest-scroll::-webkit-scrollbar-thumb:hover {
            background: #8b949e;
        }

        .dashboard-tabs {
            min-height: 0;
        }

        .dashboard-tabs .ant-tabs-content-holder,
        .dashboard-tabs .ant-tabs-content,
        .dashboard-tabs .ant-tabs-tabpane {
            height: 100%;
            min-height: 0;
        }

        /* View Transition Animation */
        ::view-transition-old(root),
        ::view-transition-new(root) {
            animation: none;
            mix-blend-mode: normal;
        }

        /* Custom Mask Styles */
        .ant-image-preview-mask,
        .ant-image-preview-wrap,
        .ant-modal-mask {
            background-color: rgba(0, 0, 0, 0.2) !important;
            backdrop-filter: blur(10px) !important;
        }

        ::view-transition-old(root) {
            z-index: 1;
        }

        ::view-transition-new(root) {
            z-index: 999;
        }
    </style>
</head>

<body class="bg-[#f5f7fa] dark:bg-[#0d1117] transition-colors duration-300">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { flushSync } = ReactDOM;
        const {
            Layout, Menu, Table, Card, Statistic, Row, Col,
            Tag, Button, Space, Input, Modal, message, Popconfirm,
            Typography, ConfigProvider, theme, Badge, Tooltip, Avatar,
            Empty, Tabs, Image: AntImage, Dropdown, Form, DatePicker
        } = antd;
        const {
            DashboardOutlined, CloudServerOutlined, DeleteOutlined, SearchOutlined,
            ReloadOutlined, DatabaseOutlined, ClockCircleOutlined, HddOutlined,
            TeamOutlined, EyeOutlined, AppstoreOutlined,
            LoadingOutlined, DownloadOutlined, RotateLeftOutlined, RotateRightOutlined,
            ZoomInOutlined, ZoomOutOutlined, SwapOutlined, DownOutlined, LockOutlined, UserOutlined,
            PlusOutlined, EditOutlined, UnorderedListOutlined
        } = icons;
        const { defaultAlgorithm, darkAlgorithm } = theme;

        const { Header, Content, Sider } = Layout;
        const { Title, Text } = Typography;

        const API_BASE = window.location.origin;

        // formatSize helper
        const formatSize = (bytes) => {
            if (bytes === 0 || !bytes || isNaN(bytes)) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        };

        // Enhanced type map with FontAwesome (Flat Icons)
        const typeMap = {
            text: { label: 'TEXT', color: 'blue', icon: <i className="fa-solid fa-font"></i> },
            image: { label: 'IMAGE', color: 'purple', icon: <i className="fa-regular fa-image"></i> },
            files: { label: 'FILES', color: 'orange', icon: <i className="fa-regular fa-folder"></i> },
            link: { label: 'LINK', color: 'cyan', icon: <i className="fa-solid fa-link"></i> },
            html: { label: 'HTML', color: 'magenta', icon: <i className="fa-brands fa-html5"></i> },
            color: { label: 'COLOR', color: 'pink', icon: <i className="fa-solid fa-palette"></i> },
            default: { label: 'UNKNOWN', color: 'default', icon: <i className="fa-regular fa-file"></i> }
        };

        const App = () => {
            const [messageApi, contextHolder] = message.useMessage();
            const [currentView, setCurrentView] = useState(localStorage.getItem('dashboard-view') || 'dashboard');
            const [scrollProgress, setScrollProgress] = useState(0);
            const requestRef = useRef();

            const handleScroll = (e) => {
                const { scrollTop, scrollHeight, clientHeight } = e.target;

                if (requestRef.current) return;

                requestRef.current = requestAnimationFrame(() => {
                    if (scrollHeight <= clientHeight) {
                        setScrollProgress(0);
                    } else {
                        const progress = (scrollTop / (scrollHeight - clientHeight)) * 100;
                        setScrollProgress(Math.min(100, Math.max(0, progress)));
                    }
                    requestRef.current = null;
                });
            };

            useEffect(() => {
                setScrollProgress(0);
            }, [currentView]);
            const [isDarkMode, setIsDarkMode] = useState(() => {
                const saved = localStorage.getItem('mode');
                if (saved) return saved === 'dark';
                return window.matchMedia('(prefers-color-scheme: dark)').matches;
            });

            // Admin Auth State
            const [adminToken, setAdminToken] = useState(localStorage.getItem('pastex_admin_token') || '');
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);
            const [adminLoginLoading, setAdminLoginLoading] = useState(false);

            const [favorites, setFavorites] = useState([]);
            const [latestItem, setLatestItem] = useState(null);
            const [currentBond, setCurrentBond] = useState(null);
            const [loading, setLoading] = useState(false);
            const [stats, setStats] = useState({ totalItems: 0, todayItems: 0, storageUsed: 0, uptime: 0, serverStartTime: Date.now() });
            const [clients, setClients] = useState([]);
            const [searchText, setSearchText] = useState('');
            const [previewModalVisible, setPreviewModalVisible] = useState(false);
            const [previewData, setPreviewData] = useState(null);
            const [base64ModalVisible, setBase64ModalVisible] = useState(false);
            const [base64Content, setBase64Content] = useState('');
            const [clientModalVisible, setClientModalVisible] = useState(false);
            const [uptimeFormatted, setUptimeFormatted] = useState("0天 00:00:00");

            // Server Users (Admin View)
            const [serverUsers, setServerUsers] = useState([]);

            // Changelog Management
            const [changelogData, setChangelogData] = useState([]);
            const [changelogLoading, setChangelogLoading] = useState(false);
            const [changelogModalVisible, setChangelogModalVisible] = useState(false);
            const [editingChangelog, setEditingChangelog] = useState(null);
            const [changelogForm] = Form.useForm();

            // Token Management
            // authType: 'token' (default) | 'hash' (direct access)
            const [authType, setAuthType] = useState('token');

            const [token, setToken] = useState(localStorage.getItem('pastex_token') || '');
            const [keyModalVisible, setKeyModalVisible] = useState(false);
            const [inputKey, setInputKey] = useState('');

            // Check Admin Token Validity on Load
            useEffect(() => {
                if (adminToken) {
                    fetch(`${API_BASE}/api/auth/check`, { headers: { 'x-admin-token': adminToken } })
                        .then(res => res.json())
                        .then(data => {
                            if (data.success) {
                                setIsAdminLoggedIn(true);
                                localStorage.setItem('pastex_admin_token', adminToken);
                            } else {
                                setAdminToken('');
                                localStorage.removeItem('pastex_admin_token');
                                setIsAdminLoggedIn(false);
                            }
                        })
                        .catch(() => {
                            setAdminToken('');
                            setIsAdminLoggedIn(false);
                        });
                }
            }, []);

            const handleAdminLogin = async (values) => {
                setAdminLoginLoading(true);
                try {
                    // 1. Get Public Key
                    const keyRes = await fetch(`${API_BASE}/api/auth/public-key`);
                    const keyData = await keyRes.json();

                    if (!keyData.success) throw new Error('Failed to get public key');

                    // 2. Encrypt Password using Web Crypto API (RSA-OAEP)
                    const pemContents = keyData.publicKey
                        .replace(/-----BEGIN PUBLIC KEY-----/, '')
                        .replace(/-----END PUBLIC KEY-----/, '')
                        .replace(/\s/g, '');
                    const binaryDer = Uint8Array.from(atob(pemContents), c => c.charCodeAt(0));

                    const cryptoKey = await crypto.subtle.importKey(
                        'spki',
                        binaryDer.buffer,
                        { name: 'RSA-OAEP', hash: 'SHA-256' },
                        false,
                        ['encrypt']
                    );

                    const encoded = new TextEncoder().encode(values.password);
                    const encrypted = await crypto.subtle.encrypt(
                        { name: 'RSA-OAEP' },
                        cryptoKey,
                        encoded
                    );
                    const encryptedPassword = btoa(String.fromCharCode(...new Uint8Array(encrypted)));

                    if (!encryptedPassword) throw new Error('Encryption failed');

                    // 3. Login
                    const loginRes = await fetch(`${API_BASE}/api/auth/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ encryptedPassword })
                    });
                    const loginData = await loginRes.json();

                    if (loginData.success) {
                        setAdminToken(loginData.token);
                        localStorage.setItem('pastex_admin_token', loginData.token);
                        setIsAdminLoggedIn(true);
                        messageApi.success('登录成功');
                    } else {
                        messageApi.error(loginData.error || '登录失败');
                    }
                } catch (error) {
                    messageApi.error('登录错误: ' + error.message);
                } finally {
                    setAdminLoginLoading(false);
                }
            };

            // Update local storage when token changes
            useEffect(() => {
                if (token) localStorage.setItem('pastex_token', token);
                else localStorage.removeItem('pastex_token');
                if (token && isAdminLoggedIn) fetchData(); // Refetch data when token changes
            }, [token, isAdminLoggedIn]);

            const handleAddKey = (key) => {
                if (!key) {
                    setToken('');
                    return;
                }
                setToken(key);
                setKeyModalVisible(false);
                messageApi.success('已切换密钥');
            };

            const handleAdminLogout = async () => {
                try {
                    if (adminToken) {
                        await fetch(`${API_BASE}/api/auth/logout`, {
                            method: 'POST',
                            headers: { 'x-admin-token': adminToken }
                        });
                    }
                } catch (_error) {
                    // ignore network error on logout
                } finally {
                    setAdminToken('');
                    setIsAdminLoggedIn(false);
                    localStorage.removeItem('pastex_admin_token');
                    setToken('');
                    setServerUsers([]);
                    setFavorites([]);
                    setLatestItem(null);
                    setCurrentBond(null);
                    setClients([]);
                    messageApi.success('已退出登录');
                }
            };



            // Sync Theme
            useEffect(() => {
                const root = window.document.documentElement;
                if (isDarkMode) {
                    root.classList.add('dark');
                    document.body.classList.add('dark');
                    localStorage.setItem('mode', 'dark');
                } else {
                    root.classList.remove('dark');
                    document.body.classList.remove('dark');
                    localStorage.setItem('mode', 'light');
                }
            }, [isDarkMode]);

            // Listen for storage changes
            useEffect(() => {
                const handleStorage = (e) => {
                    if (e.key === 'mode') {
                        setIsDarkMode(e.newValue === 'dark');
                    }
                };
                window.addEventListener('storage', handleStorage);
                return () => window.removeEventListener('storage', handleStorage);
            }, []);

            const toggleTheme = async (event) => {
                const nextMode = !isDarkMode;

                if (!document.startViewTransition) {
                    setIsDarkMode(nextMode);
                    return;
                }

                const x = event.clientX;
                const y = event.clientY;
                const endRadius = Math.hypot(
                    Math.max(x, innerWidth - x),
                    Math.max(y, innerHeight - y),
                );

                const transition = document.startViewTransition(() => {
                    flushSync(() => {
                        setIsDarkMode(nextMode);
                        if (nextMode) {
                            document.documentElement.classList.add('dark');
                            document.body.classList.add('dark');
                        } else {
                            document.documentElement.classList.remove('dark');
                            document.body.classList.remove('dark');
                        }
                    });
                });

                await transition.ready;
                document.documentElement.animate(
                    {
                        clipPath: [
                            `circle(0px at ${x}px ${y}px)`,
                            `circle(${endRadius}px at ${x}px ${y}px)`,
                        ],
                    },
                    {
                        duration: 500,
                        easing: 'ease-in-out',
                        pseudoElement: '::view-transition-new(root)',
                    },
                );
            };

            // Fetch Server Users (Admin)
            const fetchServerUsers = async () => {
                if (!isAdminLoggedIn) return;
                try {
                    const res = await fetch(`${API_BASE}/api/admin/users`, {
                        headers: { 'x-admin-token': adminToken }
                    });
                    if (res.status === 401) {
                        setIsAdminLoggedIn(false);
                        return;
                    }
                    const data = await res.json();
                    if (data.success) {
                        setServerUsers(data.data);
                    }
                } catch (error) {
                    console.error('Failed to fetch server users:', error);
                }
            };

            // === Changelog CRUD ===
            const fetchChangelog = async () => {
                setChangelogLoading(true);
                try {
                    const res = await fetch(`${API_BASE}/api/changelog`);
                    const data = await res.json();
                    if (data.success) setChangelogData(data.data);
                } catch (error) {
                    messageApi.error('获取更新日志失败');
                } finally {
                    setChangelogLoading(false);
                }
            };

            const handleSaveChangelog = async (values) => {
                const items = values.items.split('\n').map(s => s.trim()).filter(Boolean);
                const links = (values.links || []).filter(l => l && l.text && l.url);
                const body = {
                    version: values.version,
                    date: values.date,
                    items,
                    links
                };

                try {
                    let res;
                    if (editingChangelog) {
                        res = await fetch(`${API_BASE}/api/admin/changelog/${editingChangelog.id}`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
                            body: JSON.stringify(body)
                        });
                    } else {
                        res = await fetch(`${API_BASE}/api/admin/changelog`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken },
                            body: JSON.stringify(body)
                        });
                    }
                    const data = await res.json();
                    if (data.success) {
                        messageApi.success(editingChangelog ? '更新成功' : '添加成功');
                        setChangelogModalVisible(false);
                        setEditingChangelog(null);
                        changelogForm.resetFields();
                        fetchChangelog();
                    } else {
                        messageApi.error(data.error || '操作失败');
                    }
                } catch (error) {
                    messageApi.error('请求失败: ' + error.message);
                }
            };

            const handleDeleteChangelog = async (id) => {
                try {
                    const res = await fetch(`${API_BASE}/api/admin/changelog/${id}`, {
                        method: 'DELETE',
                        headers: { 'x-admin-token': adminToken }
                    });
                    const data = await res.json();
                    if (data.success) {
                        messageApi.success('已删除');
                        fetchChangelog();
                    } else {
                        messageApi.error(data.error || '删除失败');
                    }
                } catch (error) {
                    messageApi.error('请求失败: ' + error.message);
                }
            };

            const openEditChangelog = (entry) => {
                setEditingChangelog(entry);
                changelogForm.setFieldsValue({
                    version: entry.version,
                    date: entry.date,
                    items: entry.items.join('\n'),
                    links: entry.links && entry.links.length > 0 ? entry.links : []
                });
                setChangelogModalVisible(true);
            };

            const openAddChangelog = () => {
                setEditingChangelog(null);
                changelogForm.resetFields();
                changelogForm.setFieldsValue({
                    date: dayjs().format('YYYY-MM-DD'),
                    links: []
                });
                setChangelogModalVisible(true);
            };

            // Delete User (Admin)
            const handleDeleteUser = async (tokenHash) => {
                try {
                    const res = await fetch(`${API_BASE}/api/admin/users/${tokenHash}`, {
                        method: 'DELETE',
                        headers: { 'x-admin-token': adminToken }
                    });
                    const data = await res.json();
                    if (data.success) {
                        messageApi.success('用户已删除');
                        fetchServerUsers(); // Refresh list
                        // If current user was deleted, reset view
                        if ((authType === 'token' && serverUsers.find(u => u.tokenHash === tokenHash)?.key === token) ||
                            (authType === 'hash' && token === tokenHash)) {
                            setToken('');
                        }
                    } else {
                        messageApi.error('删除失败: ' + data.error);
                    }
                } catch (error) {
                    messageApi.error('请求失败: ' + error.message);
                }
            };

            // Data Fetching
            const fetchData = async () => {
                // If no token, clear data and don't fetch protected endpoints
                if (!token) {
                    setFavorites([]);
                    setLatestItem(null);
                    setCurrentBond(null);
                    setStats({ totalItems: 0, todayItems: 0, storageUsed: 0, uptime: 0, serverStartTime: Date.now() });
                    setClients([]);
                    setLoading(false);
                    return;
                }

                setLoading(true);
                try {
                    const headers = {};
                    if (authType === 'token') {
                        if (token) headers['Authorization'] = `Bearer ${token}`;
                    } else {
                        // Direct Hash Access
                        headers['x-token-hash'] = token;
                    }

                    const res = await fetch(`${API_BASE}/api/favorites`, { headers });
                    if (res.status === 401) throw new Error('Unauthorized');
                    const data = await res.json();
                    if (data.success) setFavorites(data.data.sort((a, b) => new Date(b.createTime) - new Date(a.createTime)));

                    const latestRes = await fetch(`${API_BASE}/api/latest`, { headers });
                    if (latestRes.status === 401) throw new Error('Unauthorized');
                    if (latestRes.status === 404) {
                        setLatestItem(null);
                    } else {
                        const latestData = await latestRes.json();
                        if (latestData.success) {
                            setLatestItem(latestData.data || null);
                        } else {
                            setLatestItem(null);
                        }
                    }

                    const bondRes = await fetch(`${API_BASE}/api/bond/me`, { headers });
                    if (bondRes.status === 401) throw new Error('Unauthorized');
                    const bondData = await bondRes.json();
                    if (bondData.success) {
                        setCurrentBond(bondData.data || null);
                    } else {
                        setCurrentBond(null);
                    }

                    const statsRes = await fetch(`${API_BASE}/api/stats`, { headers });
                    if (statsRes.status === 401) throw new Error('Unauthorized');
                    const statsData = await statsRes.json();
                    if (statsData.success) setStats(statsData.data);

                    const clientsRes = await fetch(`${API_BASE}/api/clients`, { headers });
                    if (clientsRes.status === 401) throw new Error('Unauthorized');
                    const clientsData = await clientsRes.json();
                    if (clientsData.success) setClients(clientsData.data || []);

                } catch (error) {
                    if (error.message !== 'Unauthorized') {
                        messageApi.error('获取数据失败: ' + error.message);
                    }
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                if (isAdminLoggedIn) {
                    fetchServerUsers();
                    fetchChangelog();
                    if (token) fetchData();

                    const interval = setInterval(() => {
                        if (token) fetchData();
                        fetchServerUsers();
                    }, 30000);
                    return () => clearInterval(interval);
                }
            }, [token, isAdminLoggedIn]);

            useEffect(() => {
                if (!stats.serverStartTime) return;
                const updateTimer = () => {
                    const now = Date.now();
                    const diff = now - stats.serverStartTime;
                    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                    const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                    const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((diff % (1000 * 60)) / 1000);
                    setUptimeFormatted(`${days}天 ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`);
                };
                updateTimer();
                const timer = setInterval(updateTimer, 1000);
                return () => clearInterval(timer);
            }, [stats.serverStartTime]);

            const handleDelete = async (id) => {
                try {
                    const headers = {};
                    if (authType === 'token') {
                        if (token) headers['Authorization'] = `Bearer ${token}`;
                    } else {
                        headers['x-token-hash'] = token;
                    }

                    const res = await fetch(`${API_BASE}/api/favorites/${id}`, { method: 'DELETE', headers });
                    const data = await res.json();

                                                        <Button type="text" icon={<ZoomInOutlined style={{ fontSize: 18, color: '#fff' }} />} disabled={scale === 50} onClick={onZoomIn} />

                                        <img src="./PasteX.png" alt="Logo" className="w-full h-full object-cover" />
                                    </div>
                                    <span className="font-bold text-xl text-slate-800 dark:text-white tracking-tight">PasteX <span className="text-blue-500">Server</span></span>
                                </div>
                                <div className="hidden md:flex items-center gap-6 relative">
                                    <div
                                        className={`w-20 text-center cursor-pointer font-bold text-base transition-colors py-5 ${currentView === 'dashboard' ? 'text-blue-500' : 'text-slate-500 dark:text-gray-400 hover:text-slate-700 dark:hover:text-gray-200'}`}
                                        onClick={() => setCurrentView('dashboard')}
                                    >
                                        同步管理
                                    </div>
                                    <div
                                        className={`w-20 text-center cursor-pointer font-bold text-base transition-colors py-5 ${currentView === 'changelog' ? 'text-blue-500' : 'text-slate-500 dark:text-gray-400 hover:text-slate-700 dark:hover:text-gray-200'}`}
                                        onClick={() => setCurrentView('changelog')}
                                    >
                                        更新日志
                                    </div>
                                    <div
                                        className="absolute bottom-0 left-0 w-20 h-0.5 bg-blue-500 rounded-full transition-transform duration-300 ease-in-out"
                                        style={{ transform: currentView === 'dashboard' ? 'translateX(0)' : 'translateX(calc(100% + 24px))' }}
                                    ></div>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                {currentView === 'dashboard' && (
                                    <Dropdown
                                        menu={{
                                            items: [
                                                {
                                                    key: 'group-server',
                                                    type: 'group',
                                                    label: '用户列表 (User List)',
                                                    children: serverUsers.length > 0 ? serverUsers.map(u => {
                                                        const isKeyKnown = !!u.key;
                                                        const displayToken = isKeyKnown ? u.key : u.tokenHash;
                                                        const isActive = (authType === 'token' && token === u.key) || (authType === 'hash' && token === u.tokenHash);

                                                        return {
                                                            key: `user-${u.tokenHash}`,
                                                            label: (
                                                                <div className="flex justify-between items-center w-64 group">
                                                                    <div className="flex-1 cursor-pointer" onClick={() => {
                                                                        if (isKeyKnown) {
                                                                            setToken(u.key);
                                                                            setAuthType('token');
                                                                        } else {
                                                                            // Only hash known
                                                                            setToken(u.tokenHash);
                                                                            setAuthType('hash');
                                                                        }
                                                                    }}>
                                                                        <div className="flex flex-col overflow-hidden">
                                                                            <div className="flex items-center gap-2">
                                                                                <i className={`fa-solid ${isKeyKnown ? 'fa-key text-blue-500' : 'fa-database text-purple-500'}`}></i>
                                                                                <span className="truncate font-medium text-slate-700 dark:text-gray-300 w-32" title={isKeyKnown ? u.key : `Hash: ${u.tokenHash}`}>
                                                                                    {isKeyKnown ? u.key : `User (Hash)`}
                                                                                </span>
                                                                            </div>
                                                                            <span className="text-xs text-slate-400 pl-6">
                                                                                {u.count} 条记录 · {formatSize(u.storageUsed)}
                                                                            </span>
                                                                        </div>
                                                                    </div>

                                                                    <div className="flex items-center gap-2 pl-2">
                                                                        {isActive && <i className="fa-solid fa-check text-green-500"></i>}
                                                                        <div onClick={(e) => e.stopPropagation()}>
                                                                            <Popconfirm
                                                                                title={<span className="font-bold text-slate-800 dark:text-white">确认删除用户</span>}
                                                                                description={<div className="max-w-xs text-slate-600 dark:text-gray-300">
                                                                                    确定要删除用户 <span className="font-mono bg-slate-100 dark:bg-gray-800 px-1 rounded text-xs">{isKeyKnown ? u.key : (u.tokenHash.substring(0, 8) + '...')}</span><br />及其所有数据吗？此操作不可恢复。
                                                                                </div>}
                                                                                onConfirm={() => handleDeleteUser(u.tokenHash)}
                                                                                okText="删除"
                                                                                cancelText="取消"
                                                                                okButtonProps={{ danger: true }}
                                                                            >
                                                                                <Button
                                                                                    type="text"
                                                                                    danger
                                                                                    size="small"
                                                                                    className="opacity-0 group-hover:opacity-100 transition-opacity"
                                                                                    icon={<DeleteOutlined />}
                                                                                />
                                                                            </Popconfirm>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            )
                                                        };
                                                    }) : [{ key: 'no-users', label: <span className="text-slate-400 text-xs pl-4">暂无用户数据</span>, disabled: true }]
                                                }
                                            ]
                                        }}
                                        trigger={['click']}
                                        overlayClassName="h-[400px] overflow-auto"
                                    >
                                        <Button
                                            className={`flex items-center gap-2 border-slate-200 dark:border-gray-700 ${token ? 'text-green-600 dark:text-green-500 border-green-200 bg-green-50 dark:bg-green-900/20' : 'text-slate-600 dark:text-gray-300'}`}
                                        >
                                            <i className={`fa-solid ${authType === 'hash' ? 'fa-database' : 'fa-key'}`}></i>
                                            <span className="max-w-[100px] truncate font-mono">
                                                {token ? (authType === 'hash' ? 'User...' : `${token.substring(0, 4)}...${token.substring(token.length - 4)}`) : '选择用户'}
                                            </span>
                                            <DownOutlined className="text-xs" />
                                        </Button>
                                    </Dropdown>
                                )}
                                <Button
                                    className="flex items-center gap-2 border-slate-200 dark:border-gray-700 text-slate-600 dark:text-gray-300 hover:text-blue-500 dark:hover:text-blue-400 hover:border-blue-200 dark:hover:border-blue-900"
                                    href="/"
                                >
                                    <i className="fa-solid fa-house"></i> 首页
                                </Button>
                                <Button
                                    className="flex items-center gap-2 border-slate-200 dark:border-gray-700 text-slate-600 dark:text-gray-300 hover:text-red-500 dark:hover:text-red-400 hover:border-red-200 dark:hover:border-red-900"
                                    href="https://github.com/yixing233/PasteX"
                                    target="_blank"
                                >
                                    <i className="fa-brands fa-github"></i> GitHub
                                </Button>
                                <Button
                                    className="flex items-center gap-2 border-slate-200 dark:border-gray-700 text-slate-600 dark:text-gray-300 hover:text-red-500 dark:hover:text-red-400 hover:border-red-200 dark:hover:border-red-900"
                                    onClick={handleAdminLogout}
                                >
                                    <i className="fa-solid fa-right-from-bracket"></i> 退出登录
                                </Button>
                                <Button
                                    icon={isDarkMode ? <i className="fa-solid fa-sun"></i> : <i className="fa-solid fa-moon"></i>}
                                    onClick={toggleTheme}
                                    className="border-slate-200 dark:border-[#30363d] text-slate-600 dark:text-gray-300"
                                />
                            </div>
                        </Header>

                        {currentView === 'changelog' ? (
                            <Content key="changelog" className="p-6 max-w-7xl mx-auto w-full flex-1 overflow-hidden flex flex-col animate-fade-slide-in">
                                {changelogSection}
                            </Content>
                        ) : !token ? (
                            <Content key="empty" className="p-6 max-w-7xl mx-auto w-full flex-1 flex flex-col items-center justify-center text-center animate-fade-slide-in">
                                <div className="bg-white dark:bg-[#161b22] p-12 rounded-3xl shadow-card dark:shadow-none border border-slate-100 dark:border-[#30363d] max-w-lg w-full">
                                    <div className="w-20 h-20 bg-blue-50 dark:bg-blue-900/20 rounded-2xl flex items-center justify-center mx-auto mb-6">
                                        <i className="fa-solid fa-user-lock text-4xl text-blue-500"></i>
                                    </div>
                                    <h2 className="text-2xl font-bold text-slate-800 dark:text-white mb-3">请选择用户</h2>
                                    <p className="text-slate-500 dark:text-gray-400 mb-8">
                                        请从右上角的下拉菜单中选择一个用户以查看其数据。<br />
                                        如果尚未有用户连接，请先在 PasteX 客户端中配置同步密钥。
                                    </p>
                                    <div className="flex justify-center">
                                        <span className="inline-flex items-center gap-2 px-4 py-2 bg-slate-100 dark:bg-gray-800 rounded-lg text-slate-600 dark:text-gray-300 text-sm">
                                            <i className="fa-solid fa-info-circle"></i>
                                            <span>同步服务现已强制要求密钥验证</span>
                                        </span>
                                    </div>
                                </div>
                            </Content>
                        ) : (
                            <Content key="dashboard" className="p-6 max-w-7xl mx-auto w-full flex-1 overflow-hidden flex flex-col animate-fade-slide-in">
                                {token && (
                                    <div className="mb-4 rounded-xl border border-slate-200 bg-slate-50 px-4 py-3 text-sm text-slate-700 dark:border-[#30363d] dark:bg-[#161b22] dark:text-gray-300">
                                        <span className="font-medium">当前纽带：</span>
                                        <span className="ml-1 font-mono">{currentBond?.username || '未识别用户名'}</span>
                                        <span className="ml-3 text-xs text-slate-500 dark:text-gray-500">Hash: {currentBond?.tokenHash?.slice?.(0, 10) || '--'}...</span>
                                    </div>
                                )}

                                {/* Stats Grid */}
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                                    <StatCard
                                        title="在线客户端"
                                        value={token ? clients.length : '--'}
                                        icon={<i className="fa-solid fa-users"></i>}
                                        variant="blue"
                                        subValue={token ? <div className="flex items-center gap-1 text-xs text-green-500 font-medium"><span className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> 运行中</div> : <span className="text-xs text-slate-400">选择用户查看</span>}
                                        onClick={token ? () => setClientModalVisible(true) : undefined}
                                    />
                                    <StatCard
                                        title="同步条目"
                                        value={token ? stats.totalItems : '--'}
                                        icon={<i className="fa-solid fa-layer-group"></i>}
                                        variant="purple"
                                        subValue={token ? <span className="text-xs text-slate-400 dark:text-gray-500">今日新增: {stats.todayItems}</span> : <span className="text-xs text-slate-400">选择用户查看</span>}
                                    />
                                    <StatCard
                                        title="存储用量"
                                        value={formatSize(stats.storageUsed)}
                                        icon={<i className="fa-solid fa-hard-drive"></i>}
                                        variant="orange"
                                        subValue={<span className="text-xs text-slate-400 dark:text-gray-500">数据文件大小</span>}
                                    />
                                    <StatCard
                                        title="运行时长"
                                        value={uptimeFormatted}
                                        icon={<i className="fa-solid fa-server"></i>}
                                        variant="green"
                                        subValue={<span className="text-xs text-slate-400 dark:text-gray-500">自上次启动</span>}
                                    />
                                </div>

                                {/* Tabbed Content */}
                                <Tabs
                                    defaultActiveKey="favorites"
                                    className="dashboard-tabs flex-1 min-h-0 flex flex-col"
                                    items={dashboardTabsItems}
                                />
                            </Content>
                        )}

                        <div className="text-center py-6 text-slate-400 dark:text-gray-600 text-sm">PasteX Server Dashboard ©2026 Created by PasteX Team</div>

                        <Modal
                            title={<div className="flex items-center gap-2"><EyeOutlined /><span>内容详情</span></div>}
                            open={previewModalVisible}
                            onCancel={() => setPreviewModalVisible(false)}
                            footer={null} width={800} centered
                            className="rounded-xl overflow-hidden"
                        >
                            {previewData && (
                                <div className="mt-4">
                                    <div className="flex items-center justify-between mb-4 bg-slate-50 dark:bg-[#0d1117] p-3 rounded-lg border border-slate-100 dark:border-[#30363d]">
                                        <Space>
                                            {(() => {
                                                const config = typeMap[previewData.type] || typeMap.default;
                                                return <Tag color={config.color} className="m-0 px-2 py-0.5 rounded text-sm font-bold flex items-center gap-1.5">{config.icon} {config.label}</Tag>;
                                            })()}
                                            <span className="text-slate-500 dark:text-gray-400 text-sm">ID: {previewData.id}</span>
                                            {previewData.deviceName && <Tag bordered={false} color="geekblue">设备: {previewData.deviceName}</Tag>}
                                            {previewData.deviceId && <Tag bordered={false} color="purple">设备ID: {String(previewData.deviceId).slice(0, 8)}...</Tag>}
                                        </Space>
                                        <span className="text-slate-400 dark:text-gray-500 text-sm">{dayjs(previewData.createTime).format('YYYY-MM-DD HH:mm:ss')}</span>
                                    </div>
                                    <div className="p-4 bg-slate-50 dark:bg-[#0d1117] rounded-lg border border-slate-200 dark:border-[#30363d] min-h-[100px] max-h-[500px] overflow-auto">
                                        {previewData.type === 'image' && previewData.imageData ? (
                                            <div className="flex justify-center bg-chess-pattern">
                                                <img src={previewData.imageData} alt="预览" style={{ maxWidth: '100%', maxHeight: '400px', objectFit: 'contain' }} />
                                            </div>
                                        ) : previewData.type === 'html' ? (
                                            <div dangerouslySetInnerHTML={{ __html: previewData.value }} className="prose dark:prose-invert max-w-none" />
                                        ) : (
                                            <pre className="whitespace-pre-wrap font-mono text-sm text-slate-700 dark:text-gray-300 m-0">{previewData.value}</pre>
                                        )}
                                    </div>
                                </div>
                            )}
                        </Modal>

                        <Modal
                            title={<div className="flex items-center gap-2"><i className="fa-solid fa-code"></i><span>图片 Base64</span></div>}
                            open={base64ModalVisible}
                            onCancel={() => setBase64ModalVisible(false)}
                            width={900}
                            centered
                            footer={[
                                <Button key="close" onClick={() => setBase64ModalVisible(false)}>关闭</Button>,
                                <Button key="copy" type="primary" onClick={handleCopyBase64}>复制 Base64</Button>
                            ]}
                        >
                            <div className="text-slate-500 dark:text-gray-400 text-xs mb-2 break-all">长度: {base64Content?.length || 0}</div>
                            <Input.TextArea
                                value={base64Content || ''}
                                readOnly
                                autoSize={{ minRows: 12, maxRows: 20 }}
                                className="font-mono text-xs"
                            />
                        </Modal>

                        <Modal
                            title={<div className="flex items-center gap-2"><TeamOutlined className="text-blue-600" /><span className="font-semibold">在线客户端详情</span></div>}
                            open={clientModalVisible} onCancel={() => setClientModalVisible(false)} footer={null} width={800} centered
                        >
                            <Table
                                columns={[
                                    { title: 'ID', dataIndex: ['info', 'id'], key: 'id', width: 200, ellipsis: false, render: (id) => <Text code copyable className="dark:text-gray-300 text-xs break-all" style={{ wordBreak: 'break-all', whiteSpace: 'normal' }}>{id || 'Unknown'}</Text> },
                                    { title: '主机名', dataIndex: ['info', 'hostname'], key: 'hostname', render: text => <span className="font-medium dark:text-gray-200">{text}</span> },
                                    { title: 'IP 地址', dataIndex: 'ip', key: 'ip', render: text => <span className="font-mono text-xs">{text || '--'}</span> },
                                    {
                                        title: '平台', dataIndex: ['info', 'platform'], key: 'platform',
                                        render: (text) => {
                                            let icon = 'windows'; if (text === 'macos') icon = 'apple'; if (text === 'linux') icon = 'linux';
                                            return <Tag icon={<i className={`fab fa-${icon}`} />} color="blue" className="px-2 py-0.5 rounded capitalize">{text}</Tag>;
                                        }
                                    },
                                    { title: '客户端版本', dataIndex: ['info', 'appVersion'], key: 'appVersion', render: (text) => <Tag color="cyan">{text || 'Unknown'}</Tag> },
                                    { title: '系统版本', dataIndex: ['info', 'osVersion'], key: 'osVersion', className: 'text-slate-500 dark:text-gray-400' },
                                    {
                                        title: '连接时长', dataIndex: 'duration', key: 'duration',
                                        render: (duration) => {
                                            const mins = Math.floor(duration / 60000); const secs = Math.floor((duration % 60000) / 1000);
                                            return <Tag color="success" bordered={false}>{mins}分 {secs}秒</Tag>;
                                        }
                                    },
                                ]}
                                dataSource={clients} rowKey={(record) => record.id} pagination={false}
                                locale={{ emptyText: <Empty image={Empty.PRESENTED_IMAGE_SIMPLE} description="暂无在线客户端" /> }} className="mt-4"
                            />
                        </Modal>

                        <Modal
                            title={<div className="flex items-center gap-2"><i className="fa-solid fa-key text-blue-500"></i><span className="font-semibold">添加访问密钥</span></div>}
                            open={keyModalVisible}
                            onCancel={() => setKeyModalVisible(false)}
                            onOk={() => { handleAddKey(inputKey); setAuthType('token'); }}
                            okText="保存"
                            cancelText="取消"
                            centered
                        >
                            <div className="py-4">
                                <p className="mb-2 text-slate-500 dark:text-gray-400">请输入您的 Secret Key 以添加至密钥列表。</p>
                                <Input.Password
                                    placeholder="输入 Secret Key..."
                                    value={inputKey}
                                    onChange={e => setInputKey(e.target.value)}
                                    size="large"
                                    prefix={<i className="fa-solid fa-lock text-slate-400"></i>}
                                    onPressEnter={() => { handleAddKey(inputKey); setAuthType('token'); }}
                                />
                            </div>
                        </Modal>

                        {/* Changelog Add/Edit Modal */}
                        <Modal
                            title={<div className="flex items-center gap-2"><i className={`fa-solid ${editingChangelog ? 'fa-pen-to-square text-orange-500' : 'fa-plus-circle text-green-500'}`}></i><span className="font-semibold">{editingChangelog ? '编辑版本' : '新增版本'}</span></div>}
                            open={changelogModalVisible}
                            onCancel={() => { setChangelogModalVisible(false); setEditingChangelog(null); changelogForm.resetFields(); }}
                            footer={null}
                            width={640}
                            centered
                            destroyOnHidden
                        >
                            <Form
                                form={changelogForm}
                                layout="vertical"
                                onFinish={handleSaveChangelog}
                                className="mt-4"
                            >
                                <div className="grid grid-cols-2 gap-4">
                                    <Form.Item
                                        name="version"
                                        label={<span className="font-medium">版本号</span>}
                                        rules={[{ required: true, message: '请输入版本号' }]}
                                    >
                                        <Input placeholder="例如: v2.0.3" prefix={<i className="fa-solid fa-tag text-slate-400"></i>} />
                                    </Form.Item>
                                    <Form.Item
                                        name="date"
                                        label={<span className="font-medium">日期</span>}
                                        rules={[{ required: true, message: '请输入日期' }]}
                                    >
                                        <Input placeholder="例如: 2026-02-16" prefix={<i className="fa-regular fa-calendar text-slate-400"></i>} />
                                    </Form.Item>
                                </div>

                                <Form.Item
                                    name="items"
                                    label={<span className="font-medium">更新内容 <span className="text-slate-400 font-normal">(每行一条)</span></span>}
                                    rules={[{ required: true, message: '请输入更新内容' }]}
                                >
                                    <Input.TextArea
                                        rows={5}
                                        placeholder={"优化了某某功能\n修复了某某问题\n新增了某某特性"}
                                        className="font-mono text-sm"
                                    />
                                </Form.Item>

                                <Form.List name="links">
                                    {(fields, { add, remove }) => (
                                        <div>
                                            <div className="flex items-center justify-between mb-2">
                                                <span className="font-medium text-sm text-slate-700 dark:text-gray-300">
                                                    <i className="fa-solid fa-link text-slate-400 mr-1.5"></i>下载链接 <span className="text-slate-400 font-normal">(可选)</span>
                                                </span>
                                                <Button type="dashed" size="small" onClick={() => add()} icon={<PlusOutlined />}>添加链接</Button>
                                            </div>
                                            {fields.map(({ key, name, ...restField }) => (
                                                <div key={key} className="flex gap-2 mb-2">
                                                    <Form.Item {...restField} name={[name, 'text']} className="flex-1 mb-0">
                                                        <Input placeholder="链接文本 (如: 安装版下载)" size="small" />
                                                    </Form.Item>
                                                    <Form.Item {...restField} name={[name, 'url']} className="flex-[2] mb-0">
                                                        <Input placeholder="下载 URL" size="small" />
                                                    </Form.Item>
                                                    <Button type="text" danger size="small" icon={<DeleteOutlined />} onClick={() => remove(name)} />
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </Form.List>

                                <div className="flex justify-end gap-3 mt-6 pt-4 border-t border-slate-100 dark:border-[#30363d]">
                                    <Button onClick={() => { setChangelogModalVisible(false); setEditingChangelog(null); }}>取消</Button>
                                    <Button type="primary" htmlType="submit">
                                        <i className="fa-solid fa-check mr-1.5"></i>
                                        {editingChangelog ? '保存修改' : '添加版本'}
                                    </Button>
                                </div>
                            </Form>
                        </Modal>
                    </Layout>
                </ConfigProvider>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
